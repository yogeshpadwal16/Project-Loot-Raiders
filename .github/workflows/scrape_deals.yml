name: Automated Deal Matrix Scraper

on:
  # schedule:
  #   - cron: '*/15 0-20 * * *' # Runs every 15 minutes from 5:30 AM IST to 2:15 AM IST (00:00 - 20:45 UTC)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write # Allows the action to commit and push changes back to the repo

concurrency:
  group: deals-scraper
  cancel-in-progress: true # Prevents concurrent runs by canceling active loops when new cron starts

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium Browser
        run: |
          playwright install chromium --with-deps

      - name: Run Scraper Loop
        env:
          GITHUB_ACTIONS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_STRING_SESSION: ${{ secrets.TELEGRAM_STRING_SESSION }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
        run: |
          python scripts/loop_runner.py
