<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Loot Raiders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-orange: #f39c12;
            --accent-blue: #3498db;
            --border-color: rgba(148, 163, 184, 0.1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Ambient glowing background */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .offline-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background: rgba(243, 156, 18, 0.1);
            border: 2px dashed var(--accent-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 3rem;
            color: var(--accent-orange);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(243, 156, 18, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px 5px rgba(243, 156, 18, 0.1); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .checklist {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            text-align: left;
            margin-bottom: 30px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        
        .checklist-item:last-child {
            margin-bottom: 0;
        }

        .checklist-item i {
            color: var(--accent-blue);
            font-size: 0.9rem;
        }

        .btn-retry {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.4);
        }

        .btn-retry:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="offline-container">
        <div class="icon-wrapper">
            <i class="fa-solid fa-wifi-slash"></i>
        </div>
        <h1>Connection Lost</h1>
        <p>Loot Raiders is temporarily offline. Please check your internet settings. We will automatically reconnect you once the network recovers.</p>
        
        <div class="checklist">
            <div class="checklist-item">
                <i class="fa-solid fa-circle-check"></i>
                <span>Check your cellular data or Wi-Fi settings</span>
            </div>
            <div class="checklist-item">
                <i class="fa-solid fa-circle-check"></i>
                <span>Verify airplane mode is turned off</span>
            </div>
            <div class="checklist-item">
                <i class="fa-solid fa-circle-check"></i>
                <span>Double-check your local router state</span>
            </div>
        </div>

        <button class="btn-retry" onclick="window.location.reload();">
            <i class="fa-solid fa-rotate-right"></i>
            Retry Connection
        </button>
    </div>
</body>
</html>
